version: "3.9"

# ─────────────────────────────────────────────────────────────────
# Local Development Compose File
# Usage:
#   docker compose up --build        # start all services
#   docker compose down -v           # stop + remove volumes
# ─────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ──────────────────────────────────────────
  database:
    build:
      context: ./database
      dockerfile: Dockerfile
    image: microservices-database:local
    container_name: ms-database
    restart: unless-stopped
    environment:
      POSTGRES_DB:       appdb
      POSTGRES_USER:     appuser
      POSTGRES_PASSWORD: secret
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ms-network

  # ── Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: microservices-backend:local
    container_name: ms-backend
    restart: unless-stopped
    environment:
      PORT:        3000
      DB_HOST:     database
      DB_PORT:     5432
      DB_NAME:     appdb
      DB_USER:     appuser
      DB_PASSWORD: secret
      APP_VERSION: local
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ms-network

  # ── Frontend (Nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: microservices-frontend:local
    container_name: ms-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ms-network

volumes:
  db-data:
    driver: local

networks:
  ms-network:
    driver: bridge
