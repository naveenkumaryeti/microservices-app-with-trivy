# ══════════════════════════════════════════════════════════════════════════════
# CI Workflow — Build Validation + Trivy Scan on Pull Requests / main pushes
# ══════════════════════════════════════════════════════════════════════════════
#
# Two Trivy scans per image:
#   1. Table scan  — human-readable log, never blocks, shows CRITICAL+HIGH+MEDIUM
#   2. SARIF scan  — uploaded to Security tab
#                    exit-code 1 ONLY on CRITICAL+FIXED (unfixed ignored)
#                    continue-on-error: false → blocks PR merge on real CRITICALs
#
# Fix for "exit 1 with zero CRITICAL" false-positive:
#   The SARIF scan uses --ignore-unfixed so vendor-reported unfixed CVEs
#   (common in alpine images) do not cause a spurious failure.
# ══════════════════════════════════════════════════════════════════════════════

name: CI — Build & Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents:        read
  security-events: write   # upload SARIF to GitHub Security tab

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Build each service image and run Trivy scan (no push)
  # ────────────────────────────────────────────────────────────────────────────
  build-and-scan:
    name: 🔨 Build & 🔍 Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service:    frontend
            context:    ./frontend
            dockerfile: ./frontend/Dockerfile
          - service:    backend
            context:    ./backend
            dockerfile: ./backend/Dockerfile
          - service:    database
            context:    ./database
            dockerfile: ./database/Dockerfile

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Buildx ──────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Build locally (load into daemon for Trivy) ─────────────────────
      - name: Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       false
          load:       true
          tags:       ${{ matrix.service }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=ci-${{ matrix.service }}

      # ── 4a. Trivy table scan — logs only, never blocks ────────────────────
      - name: "🔍 Trivy — ${{ matrix.service }} table (CRITICAL+HIGH+MEDIUM)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ matrix.service }}:ci"
          format:         table
          exit-code:      "0"           # informational only
          ignore-unfixed: true          # skip CVEs with no available patch
          vuln-type:      "os,library"
          severity:       "CRITICAL,HIGH,MEDIUM"
          trivyignores:   ".trivyignore"

      # ── 4b. Trivy SARIF scan — uploaded to Security tab ───────────────────
      #   exit-code 1  → blocks only on CRITICAL+FIXED vulnerabilities.
      #   ignore-unfixed: true → alpine vendor-reported unfixed CVEs won't
      #   fail the build (the root cause of the spurious exit-1 errors).
      - name: "🔍 Trivy — ${{ matrix.service }} SARIF (CRITICAL fixed only)"
        id: trivy-sarif
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ matrix.service }}:ci"
          format:         sarif
          output:         "trivy-${{ matrix.service }}-ci.sarif"
          exit-code:      "1"           # fail if CRITICAL+FIXED CVEs exist
          ignore-unfixed: true          # ← KEY FIX: unfixed = no patch = skip
          vuln-type:      "os,library"
          severity:       "CRITICAL"
          trivyignores:   ".trivyignore"

      # ── 4c. Upload SARIF — runs even if scan step failed ──────────────────
      #   'if: always()' ensures the SARIF file is uploaded whether or not
      #   the scan passed, so findings are always visible in the Security tab.
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}-ci.sarif"
          category:   "ci-trivy-${{ matrix.service }}"

      # ── 4d. Explicit failure gate ─────────────────────────────────────────
      #   If the SARIF scan (step 4b) found CRITICAL+FIXED vulns and set
      #   exit-code 1, this step re-raises the failure AFTER the SARIF upload
      #   completes. Without this, 'if: always()' on upload would mask the
      #   original failure and the job would show green.
      - name: Fail if CRITICAL vulnerabilities found
        if: steps.trivy-sarif.outcome == 'failure'
        run: |
          echo "❌ Trivy found CRITICAL vulnerabilities in ${{ matrix.service }}."
          echo "   Check the Security tab for details:"
          echo "   ${{ github.server_url }}/${{ github.repository }}/security/code-scanning"
          exit 1

  # ────────────────────────────────────────────────────────────────────────────
  # Validate docker-compose syntax
  # ────────────────────────────────────────────────────────────────────────────
  validate-compose:
    name: ✅ Validate docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet
