# ══════════════════════════════════════════════════════════════════════════════
# CI Workflow — Build Validation + Trivy Scan on PRs / main pushes
# ══════════════════════════════════════════════════════════════════════════════
#
# Trivy strategy — direct CLI via setup-trivy (NOT trivy-action wrapper):
#   trivy-action silently strips --ignore-unfixed for SARIF, causing false
#   exit-1 on Alpine unfixed CVEs. Direct CLI fully respects all flags.
#
# Per-image scan flow:
#   Build (load) → install trivy → table scan → SARIF scan → JSON scan
#   → upload SARIF → upload JSON → fail gate
# ══════════════════════════════════════════════════════════════════════════════

name: CI — Build & Security Scan

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents:        read
  security-events: write   # required to upload SARIF to GitHub Security tab

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Build each service image and Trivy scan (no push)
  # ────────────────────────────────────────────────────────────────────────────
  build-and-scan:
    name: 🔨 Build & 🔍 Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service:    frontend
            context:    ./frontend
            dockerfile: ./frontend/Dockerfile
          - service:    backend
            context:    ./backend
            dockerfile: ./backend/Dockerfile
          - service:    database
            context:    ./database
            dockerfile: ./database/Dockerfile

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Buildx ──────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Build locally — load into daemon for Trivy ─────────────────────
      - name: Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       false
          load:       true
          tags:       ${{ matrix.service }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=ci-${{ matrix.service }}

      # ── 4. Install Trivy CLI ───────────────────────────────────────────────
      #   Pinned to commit SHA (v0.2.6) for security and reproducibility.
      #   Ref: https://github.com/aquasecurity/setup-trivy/releases/tag/v0.2.6
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          version: v0.70.0

      # ── 5a. Table scan — informational, never blocks ───────────────────────
      - name: "🔍 Trivy table — ${{ matrix.service }} (CRITICAL+HIGH+MEDIUM)"
        run: |
          trivy image \
            --format table \
            --exit-code 0 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:ci

      # ── 5b. SARIF scan — blocks on CRITICAL+FIXED only ────────────────────
      #   --ignore-unfixed: skip CVEs with no available patch
      #   --exit-code 1:    fail only when a patchable CRITICAL exists
      #   continue-on-error: allows SARIF upload to run even if scan fails
      - name: "🔍 Trivy SARIF — ${{ matrix.service }} (CRITICAL+fixed only)"
        id: trivy-sarif
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.service }}-ci.sarif \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:ci
        continue-on-error: true

      # ── 5c. JSON scan — full report saved as artifact ─────────────────────
      - name: "🔍 Trivy JSON — ${{ matrix.service }} (all severities)"
        if: always()
        run: |
          trivy image \
            --format json \
            --output trivy-${{ matrix.service }}.json \
            --exit-code 0 \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:ci

      # ── 6. Upload SARIF to GitHub Security tab ─────────────────────────────
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}-ci.sarif
          category:   ci-trivy-${{ matrix.service }}

      # ── 7. Upload JSON report as workflow artifact ─────────────────────────
      - name: Upload Trivy JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           trivy-ci-${{ matrix.service }}
          path:           trivy-${{ matrix.service }}.json
          retention-days: 14

      # ── 8. Fail gate — re-raise after SARIF is safely uploaded ────────────
      - name: "❌ Fail if patchable CRITICAL vulnerabilities found"
        if: steps.trivy-sarif.outcome == 'failure'
        run: |
          echo "❌ Trivy found patchable CRITICAL vulnerabilities in ${{ matrix.service }}."
          echo "   Fix: update the base image or the affected package, then re-push."
          echo "   Details: ${{ github.server_url }}/${{ github.repository }}/security/code-scanning"
          exit 1

  # ── Validate docker-compose syntax ────────────────────────────────────────
  validate-compose:
    name: ✅ Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config --quiet
