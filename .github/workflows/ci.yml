# ══════════════════════════════════════════════════════════════════════════════
# CI Workflow — Build Validation + Trivy Scan on PRs / main pushes
# ══════════════════════════════════════════════════════════════════════════════
#
# Trivy scanning strategy (fixes the "exit 1 with ignore-unfixed" action bug):
#
#   The official trivy-action@master ignores --ignore-unfixed when producing
#   SARIF output — it always scans all severities and exits 1 on any match.
#   Fix: install Trivy via aquasecurity/setup-trivy and run CLI directly so
#   every flag (--ignore-unfixed, --exit-code, --severity) is fully respected.
#
# Per-image scan flow:
#   1. Table scan  → human-readable log, exit 0 always (informational)
#   2. SARIF scan  → trivy CLI directly, exit 1 ONLY on CRITICAL+FIXED
#   3. JSON scan   → full report, all severities, saved as artifact
#   4. Upload SARIF → GitHub Security tab (if: always())
#   5. Fail gate   → re-raises failure after SARIF upload completes
# ══════════════════════════════════════════════════════════════════════════════

name: CI — Build & Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents:        read
  security-events: write   # required to upload SARIF to GitHub Security tab

jobs:

  build-and-scan:
    name: 🔨 Build & 🔍 Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false        # show failures for all services, not just the first
      matrix:
        include:
          - service:    frontend
            context:    ./frontend
            dockerfile: ./frontend/Dockerfile
          - service:    backend
            context:    ./backend
            dockerfile: ./backend/Dockerfile
          - service:    database
            context:    ./database
            dockerfile: ./database/Dockerfile

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Buildx ──────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Build locally (loaded into daemon for Trivy) ───────────────────
      - name: Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       false
          load:       true
          tags:       ${{ matrix.service }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=ci-${{ matrix.service }}

      # ── 4. Install Trivy CLI directly ──────────────────────────────────────
      #   Using setup-trivy instead of trivy-action gives us full CLI control,
      #   which is the only reliable way to honour --ignore-unfixed with SARIF.
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          version: v0.70.0

      # ── 5a. Table scan — informational, never blocks ───────────────────────
      - name: "🔍 Trivy table — ${{ matrix.service }}"
        run: |
          trivy image \
            --format table \
            --exit-code 0 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:ci

      # ── 5b. SARIF scan — CLI directly, respects all flags ─────────────────
      #   --ignore-unfixed: skip CVEs with no available fix
      #   --exit-code 1:    fail only when patchable CRITICALs are found
      #   Running CLI directly (not trivy-action) fixes the SARIF+unfixed bug.
      - name: "🔍 Trivy SARIF — ${{ matrix.service }} (CRITICAL+fixed only)"
        id: trivy-sarif
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.service }}-ci.sarif \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:ci
        continue-on-error: true   # let upload-sarif run even if this fails

      # ── 5c. JSON scan — full report for artifact download ─────────────────
      - name: "🔍 Trivy JSON — ${{ matrix.service }} (all severities)"
        if: always()
        run: |
          trivy image \
            --format json \
            --output trivy-${{ matrix.service }}.json \
            --exit-code 0 \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:ci

      # ── 6. Upload SARIF to GitHub Security tab ─────────────────────────────
      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}-ci.sarif
          category:   ci-trivy-${{ matrix.service }}

      # ── 7. Upload JSON report as workflow artifact ─────────────────────────
      - name: Upload Trivy JSON artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           trivy-ci-${{ matrix.service }}
          path:           trivy-${{ matrix.service }}.json
          retention-days: 14

      # ── 8. Fail gate — re-raise after SARIF is safely uploaded ────────────
      #   Without this, continue-on-error on step 5b would mark the job green.
      - name: "❌ Fail if CRITICAL+fixed vulnerabilities found"
        if: steps.trivy-sarif.outcome == 'failure'
        run: |
          echo "❌ Trivy found patchable CRITICAL vulnerabilities in ${{ matrix.service }}."
          echo "   Fix: update the base image or the affected package, then re-push."
          echo "   Details: ${{ github.server_url }}/${{ github.repository }}/security/code-scanning"
          exit 1

  # ── Validate docker-compose syntax ────────────────────────────────────────
  validate-compose:
    name: ✅ Validate docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet
