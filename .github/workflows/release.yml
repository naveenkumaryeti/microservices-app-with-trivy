# ══════════════════════════════════════════════════════════════════════════════
# Release Workflow — Build · Scan · Push · Package · Publish
# ══════════════════════════════════════════════════════════════════════════════
#
# Trivy scanning strategy (fixes the "exit 1 with ignore-unfixed" action bug):
#
#   The official trivy-action@master ignores --ignore-unfixed when producing
#   SARIF output — it always scans all severities and exits 1 on any match.
#   Fix: install Trivy via aquasecurity/setup-trivy and run CLI directly so
#   every flag (--ignore-unfixed, --exit-code, --severity) is fully respected.
#
# Per-image flow:
#   Build (load, no push) → table scan → SARIF scan → JSON scan
#   → upload SARIF → upload JSON artifact → fail gate → push to GHCR
#
# NO deployment is performed.
# ══════════════════════════════════════════════════════════════════════════════

name: Release — Build, Scan, Push & Package

on:
  release:
    types: [published]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents:        write   # upload release assets
  packages:        write   # push to GHCR
  security-events: write   # upload Trivy SARIF to GitHub Security tab
  id-token:        write   # OIDC (future cosign signing)

env:
  REGISTRY:    ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

# ══════════════════════════════════════════════════════════════════════════════
jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — extract-version
  # ────────────────────────────────────────────────────────────────────────────
  extract-version:
    name: 📋 Extract Version
    runs-on: ubuntu-latest

    outputs:
      version:       ${{ steps.parse.outputs.version }}
      version_plain: ${{ steps.parse.outputs.plain }}

    steps:
      - name: Parse and validate release tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Tag '$TAG' does not match vX.Y.Z format" >&2
            exit 1
          fi
          echo "version=${TAG}"  >> "$GITHUB_OUTPUT"
          echo "plain=${TAG#v}"  >> "$GITHUB_OUTPUT"
          echo "✅ Release version: ${TAG}"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — build-scan-push  (matrix: frontend / backend / database)
  #
  # Per-service sequence:
  #   a) Build image → load into docker daemon (NOT pushed yet)
  #   b) Install Trivy CLI via setup-trivy
  #   c) Table scan  → logs, exit 0, informational
  #   d) SARIF scan  → trivy CLI directly, exit 1 on CRITICAL+FIXED only
  #                    (ignore-unfixed is respected because we use CLI, not action)
  #   e) JSON scan   → all severities, saved as artifact + bundled in ZIP
  #   f) Upload SARIF → GitHub Security tab
  #   g) Upload JSON  → workflow artifact
  #   h) Fail gate   → re-raises failure after SARIF upload completes
  #   i) Push to GHCR → only reached if scan passed
  # ────────────────────────────────────────────────────────────────────────────
  build-scan-push:
    name: 🐳 Build · 🔍 Scan · 📤 Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: extract-version

    strategy:
      fail-fast: true
      matrix:
        include:
          - service:    frontend
            context:    ./frontend
            dockerfile: ./frontend/Dockerfile
          - service:    backend
            context:    ./backend
            dockerfile: ./backend/Dockerfile
          - service:    database
            context:    ./database
            dockerfile: ./database/Dockerfile

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Buildx ──────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # ── 3. GHCR login ──────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Image metadata ──────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.extract-version.outputs.version }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.version=${{ needs.extract-version.outputs.version_plain }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── 5. Build locally — load into daemon, do NOT push yet ──────────────
      - name: Build ${{ matrix.service }} (local — pre-scan)
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       false
          load:       true
          tags:       ${{ matrix.service }}:scan-target
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

      # ── 6. Install Trivy CLI ───────────────────────────────────────────────
      #   Using setup-trivy + direct CLI invocation instead of trivy-action.
      #   The trivy-action wrapper ignores --ignore-unfixed for SARIF output,
      #   causing exit 1 on unfixable Alpine CVEs. Running trivy directly
      #   fixes this because all CLI flags are fully respected.
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          version: v0.70.0

      # ── 7a. Table scan — informational log, never blocks ──────────────────
      - name: "🔍 Trivy table — ${{ matrix.service }} (CRITICAL+HIGH+MEDIUM)"
        run: |
          trivy image \
            --format table \
            --exit-code 0 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:scan-target

      # ── 7b. SARIF scan — CLI directly, blocks on CRITICAL+FIXED only ──────
      #   --ignore-unfixed: CVEs with no available patch are skipped
      #   --exit-code 1:    fail only when a patchable CRITICAL exists
      #   continue-on-error: allows steps 7c, 8, 9 to run even on failure
      - name: "🔍 Trivy SARIF — ${{ matrix.service }} (CRITICAL+fixed only)"
        id: trivy-sarif
        run: |
          trivy image \
            --format sarif \
            --output trivy-${{ matrix.service }}.sarif \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:scan-target
        continue-on-error: true   # upload SARIF even if scan failed

      # ── 7c. JSON scan — full report, all severities, always runs ──────────
      - name: "🔍 Trivy JSON — ${{ matrix.service }} (all severities)"
        if: always()
        run: |
          trivy image \
            --format json \
            --output trivy-${{ matrix.service }}.json \
            --exit-code 0 \
            --vuln-type os,library \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --ignorefile .trivyignore \
            ${{ matrix.service }}:scan-target

      # ── 8. Upload SARIF to GitHub Security tab ─────────────────────────────
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category:   trivy-${{ matrix.service }}

      # ── 9. Upload JSON as workflow artifact ────────────────────────────────
      - name: Upload Trivy JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           "trivy-report-${{ matrix.service }}-${{ needs.extract-version.outputs.version }}"
          path:           trivy-${{ matrix.service }}.json
          retention-days: 30

      # ── 10. Explicit fail gate ─────────────────────────────────────────────
      #   Re-raise the failure AFTER SARIF is uploaded so findings are always
      #   visible in Security tab regardless of whether the job fails.
      - name: "❌ Fail if patchable CRITICAL vulnerabilities found"
        if: steps.trivy-sarif.outcome == 'failure'
        run: |
          echo "❌ Trivy found patchable CRITICAL vulnerabilities in ${{ matrix.service }}."
          echo "   Fix: update the base image or the vulnerable package, then re-publish the release."
          echo "   Details: ${{ github.server_url }}/${{ github.repository }}/security/code-scanning"
          exit 1

      # ── 11. Push to GHCR — only reached if scan passed ────────────────────
      - name: Push ${{ matrix.service }} to GHCR
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}
          provenance: false

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — trivy-summary
  # Download all JSON reports and publish a consolidated summary table.
  # ────────────────────────────────────────────────────────────────────────────
  trivy-summary:
    name: 📊 Trivy Scan Summary
    runs-on: ubuntu-latest
    needs: [extract-version, build-scan-push]
    if: always()

    steps:
      - name: Download Trivy JSON reports
        uses: actions/download-artifact@v4
        with:
          pattern:        "trivy-report-*-${{ needs.extract-version.outputs.version }}"
          merge-multiple: true

      - name: Write consolidated Trivy summary
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          {
            echo "## 🔍 Trivy Security Scan Summary — ${VERSION}"
            echo ""
            echo "| Service | CRITICAL | HIGH | MEDIUM | LOW | Status |"
            echo "|---------|----------|------|--------|-----|--------|"

            for SERVICE in frontend backend database; do
              REPORT="trivy-${SERVICE}.json"
              if [ -f "$REPORT" ]; then
                CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$REPORT" 2>/dev/null || echo 0)
                HIGH=$(jq     '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")]     | length' "$REPORT" 2>/dev/null || echo 0)
                MEDIUM=$(jq   '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")]   | length' "$REPORT" 2>/dev/null || echo 0)
                LOW=$(jq      '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")]      | length' "$REPORT" 2>/dev/null || echo 0)

                if   [ "${CRITICAL}" -gt 0 ]; then STATUS="❌ BLOCKED"
                elif [ "${HIGH}"     -gt 0 ]; then STATUS="⚠️ WARNING"
                else                               STATUS="✅ PASSED"
                fi
                echo "| \`${SERVICE}\` | ${CRITICAL} | ${HIGH} | ${MEDIUM} | ${LOW} | ${STATUS} |"
              else
                echo "| \`${SERVICE}\` | — | — | — | — | ⏭️ No report |"
              fi
            done

            echo ""
            echo "> **Policy:** Blocks on CRITICAL+FIXED only. Unfixed CVEs (no patch available) are ignored."
            echo "> Full reports available as workflow artifacts (30-day retention)."
            echo "> Findings: **[Security → Code scanning](${{ github.server_url }}/${{ github.repository }}/security/code-scanning)**"
          } >> "$GITHUB_STEP_SUMMARY"

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — package-release
  # Bundle source + scan reports into a ZIP and upload to the Release.
  # ────────────────────────────────────────────────────────────────────────────
  package-release:
    name: 📦 Package Release Asset
    runs-on: ubuntu-latest
    needs: [extract-version, build-scan-push]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Trivy JSON reports
        uses: actions/download-artifact@v4
        with:
          pattern:        "trivy-report-*-${{ needs.extract-version.outputs.version }}"
          merge-multiple: true
          path:           trivy-reports/

      - name: Build release directory
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          mkdir -p release/{frontend,backend,database,security}

          rsync -a --exclude='node_modules' --exclude='.git' frontend/ release/frontend/
          rsync -a --exclude='node_modules' --exclude='.git' backend/  release/backend/
          rsync -a                                           database/ release/database/

          if ls trivy-reports/*.json 1>/dev/null 2>&1; then
            cp trivy-reports/*.json release/security/
            echo "✅ Trivy reports bundled in release/security/"
          fi

          cp docker-compose.yml release/
          cp README.md release/ 2>/dev/null || echo "# ${VERSION}" > release/README.md
          echo "$VERSION" > release/VERSION

          echo "📁 Package contents:"
          find release -type f | sort

      - name: Generate production docker-compose
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          OWNER="${{ env.IMAGE_OWNER }}"
          REGISTRY="${{ env.REGISTRY }}"

          cat > release/docker-compose.prod.yml <<EOF
          # Production compose — images pulled from GHCR with pinned version tags
          # Usage: export DB_PASSWORD=secret && docker compose -f docker-compose.prod.yml up -d
          version: "3.9"
          services:
            database:
              image: ${REGISTRY}/${OWNER}/database:${VERSION}
              restart: unless-stopped
              environment:
                POSTGRES_DB:       appdb
                POSTGRES_USER:     appuser
                POSTGRES_PASSWORD: \${DB_PASSWORD:?DB_PASSWORD required}
              volumes: [db-data:/var/lib/postgresql/data]
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
                interval: 10s
                timeout:  5s
                retries:  5
              networks: [ms-network]

            backend:
              image: ${REGISTRY}/${OWNER}/backend:${VERSION}
              restart: unless-stopped
              environment:
                PORT:        3000
                DB_HOST:     database
                DB_PORT:     5432
                DB_NAME:     appdb
                DB_USER:     appuser
                DB_PASSWORD: \${DB_PASSWORD:?DB_PASSWORD required}
                APP_VERSION: ${VERSION}
              depends_on:
                database:
                  condition: service_healthy
              ports: ["3000:3000"]
              networks: [ms-network]

            frontend:
              image: ${REGISTRY}/${OWNER}/frontend:${VERSION}
              restart: unless-stopped
              ports: ["8080:80"]
              depends_on: [backend]
              networks: [ms-network]

          volumes:
            db-data:
          networks:
            ms-network:
          EOF

      - name: Create release ZIP
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          ZIP_NAME="release-${VERSION}.zip"
          zip -r "$ZIP_NAME" release/
          echo "ZIP_NAME=$ZIP_NAME"        >> "$GITHUB_ENV"
          echo "ZIP_PATH=$(pwd)/$ZIP_NAME" >> "$GITHUB_ENV"
          echo "📦 $ZIP_NAME — $(du -sh "$ZIP_NAME" | cut -f1)"

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url:         ${{ github.event.release.upload_url }}
          asset_path:         ${{ env.ZIP_PATH }}
          asset_name:         ${{ env.ZIP_NAME }}
          asset_content_type: application/zip

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 5 — release-notes
  # Update GitHub Release body + write workflow summary.
  # ────────────────────────────────────────────────────────────────────────────
  release-notes:
    name: 📝 Publish Release Notes & Summary
    runs-on: ubuntu-latest
    needs: [extract-version, build-scan-push, trivy-summary, package-release]

    steps:
      - name: Update GitHub Release body
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version  = '${{ needs.extract-version.outputs.version }}';
            const owner    = '${{ env.IMAGE_OWNER }}';
            const registry = '${{ env.REGISTRY }}';
            const sha      = '${{ github.sha }}'.substring(0, 7);
            const runUrl   = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const secUrl   = `${{ github.server_url }}/${{ github.repository }}/security/code-scanning`;
            const zipName  = `release-${version}.zip`;

            const services  = ['frontend', 'backend', 'database'];
            const imageRows = services.map(s =>
              `| \`${s}\` | \`${registry}/${owner}/${s}:${version}\` | \`${registry}/${owner}/${s}:latest\` |`
            ).join('\n');
            const pullCmds = services.map(s =>
              `docker pull ${registry}/${owner}/${s}:${version}`
            ).join('\n');

            const body = `
            ## 🚀 Release ${version}

            > Commit: \`${sha}\` · [Workflow run](${runUrl})

            ---

            ### 🔍 Security Scan (Trivy)

            All images scanned with **Trivy** before being pushed to GHCR.
            Full findings: [Security → Code scanning](${secUrl})
            JSON reports are bundled in \`release/security/\` inside the ZIP.

            | Policy | Action |
            |--------|--------|
            | CRITICAL + patch available | ❌ Blocks release — image not pushed |
            | CRITICAL + no patch (unfixed) | ⚠️ Reported, does not block |
            | HIGH / MEDIUM / LOW | ⚠️ Reported, does not block |

            ---

            ### 🐳 Docker Images

            | Service | Versioned Tag | Latest Tag |
            |---------|--------------|-----------|
            ${imageRows}

            ### 📥 Pull Commands

            \`\`\`bash
            ${pullCmds}
            \`\`\`

            ### 📦 Release Asset

            Download **\`${zipName}\`** from Assets below.

            \`\`\`
            release/
            ├── frontend/
            ├── backend/
            ├── database/
            ├── security/                    ← Trivy JSON reports
            │   ├── trivy-frontend.json
            │   ├── trivy-backend.json
            │   └── trivy-database.json
            ├── docker-compose.yml           ← Local dev (build from source)
            ├── docker-compose.prod.yml      ← Production (pull from GHCR)
            ├── README.md
            └── VERSION
            \`\`\`

            \`\`\`bash
            unzip ${zipName} && cd release
            export DB_PASSWORD=your-secure-password
            docker compose -f docker-compose.prod.yml up -d
            \`\`\`
            `.trim();

            await github.rest.repos.updateRelease({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: context.payload.release.id,
              body,
            });

      - name: Write workflow summary
        run: |
          VERSION="${{ needs.extract-version.outputs.version }}"
          OWNER="${{ env.IMAGE_OWNER }}"
          REGISTRY="${{ env.REGISTRY }}"
          {
            echo "---"
            echo "## ✅ Release ${VERSION} — Published Successfully"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Version | \`${VERSION}\` |"
            echo "| Commit  | \`${{ github.sha }}\` |"
            echo "| Asset   | \`release-${VERSION}.zip\` |"
            echo ""
            echo "## 🐳 Docker Images"
            echo ""
            echo "| Service  | Image |"
            echo "|----------|-------|"
            echo "| Frontend | \`${REGISTRY}/${OWNER}/frontend:${VERSION}\` |"
            echo "| Backend  | \`${REGISTRY}/${OWNER}/backend:${VERSION}\` |"
            echo "| Database | \`${REGISTRY}/${OWNER}/database:${VERSION}\` |"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ${REGISTRY}/${OWNER}/frontend:${VERSION}"
            echo "docker pull ${REGISTRY}/${OWNER}/backend:${VERSION}"
            echo "docker pull ${REGISTRY}/${OWNER}/database:${VERSION}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
