# ══════════════════════════════════════════════════════════════════════════════
# CI Workflow — Build Validation + Trivy Scan on Pull Requests
# ══════════════════════════════════════════════════════════════════════════════
#
# Runs on every push to main and every pull request.
# Validates that all Docker images build successfully WITHOUT pushing,
# then scans them with Trivy for vulnerabilities.
# This is the gate that must pass before a release is created.
# ══════════════════════════════════════════════════════════════════════════════

name: CI — Build & Security Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents:        read
  security-events: write   # upload SARIF to GitHub Security tab

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Build each service image and run Trivy scan (no push)
  # ────────────────────────────────────────────────────────────────────────────
  build-and-scan:
    name: 🔨 Build & 🔍 Scan — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false       # show all failures, not just the first
      matrix:
        include:
          - service:    frontend
            context:    ./frontend
            dockerfile: ./frontend/Dockerfile
          - service:    backend
            context:    ./backend
            dockerfile: ./backend/Dockerfile
          - service:    database
            context:    ./database
            dockerfile: ./database/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build locally — load into daemon for Trivy
      - name: Build ${{ matrix.service }} (no push)
        uses: docker/build-push-action@v5
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       false
          load:       true
          tags:       ${{ matrix.service }}:ci
          cache-from: type=gha,scope=ci-${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=ci-${{ matrix.service }}

      # Table scan — visible in logs, never blocks
      - name: "🔍 Trivy scan — ${{ matrix.service }} (table)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ matrix.service }}:ci"
          format:         table
          exit-code:      "0"
          ignore-unfixed: true
          vuln-type:      "os,library"
          severity:       "CRITICAL,HIGH,MEDIUM"
          trivyignores:   ".trivyignore"

      # SARIF scan — uploaded to Security tab, blocks on CRITICAL
      - name: "🔍 Trivy scan — ${{ matrix.service }} (SARIF)"
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:      "${{ matrix.service }}:ci"
          format:         sarif
          output:         "trivy-${{ matrix.service }}-ci.sarif"
          exit-code:      "1"          # block PR merge on CRITICAL
          ignore-unfixed: true
          vuln-type:      "os,library"
          severity:       "CRITICAL"
          trivyignores:   ".trivyignore"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.service }}-ci.sarif"
          category:   "ci-trivy-${{ matrix.service }}"

  # ────────────────────────────────────────────────────────────────────────────
  # Validate docker-compose syntax
  # ────────────────────────────────────────────────────────────────────────────
  validate-compose:
    name: ✅ Validate docker-compose.yml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet
